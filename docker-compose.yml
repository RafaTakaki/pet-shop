version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: petshop-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: takaki12
      MONGO_INITDB_ROOT_PASSWORD: Takaki123
      MONGO_INITDB_DATABASE: PetShop
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - petshop-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # API Application
  petshop-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: petshop-api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - MongoDbSettings__ConnectionString=mongodb://takaki12:Takaki123@mongodb:27017/?authSource=admin
      - MongoDbSettings__DatabaseName=PetShop
      - JwtSettings__SecretKey=SenhaMegaDificil1234567890SenhaMegaDificil1234567890
      - JwtSettings__Issuer=Emissor
      - JwtSettings__Audience=Audiencia
      - JwtSettings__ExpirationTimeInMinutes=30
      - JwtSettings__RefreshTokenExpirationTimeInMinutes=60
      - EmailSettings__SmtpServer=smtp.gmail.com
      - EmailSettings__SmtpPort=587
      - EmailSettings__SenderEmail=t0756833@gmail.com
      - EmailSettings__SenderName=Suporte
      - EmailSettings__SenderPassword=fxzq nzuw omgi suzh
      - PetApiSettings__ApiKey=live_nhbI7ij5XzqGD2KnVlJp6zqdA4OO4ac4q7RIeAh0Wbpi1kBeQu28pVFoBvmcTQj3
    ports:
      - "8080:8080"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - petshop-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/swagger/index.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mongodb_data:
  mongodb_config:

networks:
  petshop-network:
    driver: bridge
